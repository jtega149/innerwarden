[agent]
# Unique id for this host
host_id = "demo-host"

[output]
# Directory where JSONL + state live
data_dir = "./data"
# Keep raw events? (if false, only incidents)
write_events = true

[collectors.auth_log]
enabled = true
path = "/var/log/auth.log"

[collectors.journald]
enabled = true
# Optional: only these systemd units
units = ["sshd", "sudo", "kernel"]

[collectors.exec_audit]
enabled = false
path = "/var/log/audit/audit.log"
# Requires explicit legal authorization; only parse type=TTY when enabled.
include_tty = false

[collectors.docker]
enabled = true
socket = "/var/run/docker.sock"

[collectors.integrity]
enabled = true
paths = [
  "/etc/ssh/sshd_config",
  "/etc/sudoers",
  "/etc/sudoers.d",
  "/etc/cron.d",
]

[collectors.syslog_firewall]
# Reads kernel firewall drop lines (UFW BLOCK / iptables DROP / nftables)
# from rsyslog. On hosts where journald also captures kernel messages
# the agent attributes both collectors to the same `syslog_firewall`
# telemetry stream — see `agent/src/telemetry.rs::telemetry_stream_for`.
enabled = true
path = "/var/log/syslog"

[collectors.systemd_inventory]
# Periodic snapshot of installed/enabled systemd units. Detects newly
# created services, masked legitimate units, and freshly enabled
# persistence vectors. Emits `system.unit_*` events.
enabled = true

[collectors.suid_inventory]
# Periodic snapshot of suid/sgid binaries on common privilege paths.
# Detects newly created suid binaries (a classic privilege-escalation
# persistence technique). Emits `file.suid_*` events.
enabled = true

[detectors.ssh_bruteforce]
enabled = true
# attempts per window triggers incident
threshold = 8
window_seconds = 300

[detectors.suspicious_login]
# Fire a Medium-severity incident when a user logs in outside their normal hours.
# Requires 7 days of login history per user before activating (opt-in, default off).
anomaly_hours_enabled = false

[detectors.credential_stuffing]
enabled = false
# distinct usernames targeted by one source IP within window
threshold = 6
window_seconds = 300

[detectors.port_scan]
enabled = false
# distinct destination ports hit by one source IP within window
threshold = 12
window_seconds = 60

[detectors.sudo_abuse]
enabled = false
# suspicious sudo commands by same user in window
threshold = 3
window_seconds = 300
