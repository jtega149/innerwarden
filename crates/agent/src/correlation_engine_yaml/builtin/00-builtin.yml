  # Spec 070 — the technique-independent "exploit caught" chain. ANY illegitimate
  # privilege-provenance signal followed by ANY high-value root action on the
  # same host inside a tight window becomes ONE Critical incident. The escalation
  # mechanism is irrelevant (CIFSwitch, Dirty Pipe, nf_tables, io_uring, ...);
  # what is invariant is "gained privilege illegitimately, then used it".
  - id: "CL-072"
    name: "Illegitimate Privilege Provenance to Goal Action"
    severity: critical
    window_secs: 120
    min_confidence: 0.8
    stages:
      # layer: null (any) — these incident kinds classify to Userspace via
      # classify_layer (they are not "privilege.*"/"lsm.*"), so pinning a layer
      # would prevent the match. Kind + tight window carry the precision.
      - layer: null
        kind_patterns:
          - "$privesc_provenance_kinds"
        entity_must_match: false
      - layer: null
        kind_patterns:
          - "$root_goal_action_kinds"
        entity_must_match: false
