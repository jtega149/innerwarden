version: 1
metadata:
  id: pb-data-exfil-default
  name: "Data exfiltration default response"
  description: >-
    Deterministic SOC response for CL-002 (Recon to Exfiltration) and CL-008
    (Data Exfiltration eBPF sequence). Tarpits the source IP at the firewall,
    pages on-call, captures a 5-minute pcap, and opens a JIRA ticket. AI
    triage runs AFTER this playbook and sees the playbook outcome as
    context, so it adds enrichment instead of duplicating response.

triggers:
  - chain_id: "CL-002"
  - chain_id: "CL-008"
  # The kill chain engine emits incident ids of the form
  # `kill_chain:detected:DATA_EXFIL:<pid>:<ts>` (colons, uppercase
  # pattern) — verified against 204 real production incidents via
  # `innerwarden-agent --playbook-replay`. The earlier
  # `kill_chain_detected_DATA_EXFIL*` (underscore) glob matched ZERO real
  # incidents. This `*`-separated glob matches the real id; the lowercase
  # `data_exfil` tag is also a match candidate.
  - kind_glob: "kill_chain*DATA_EXFIL*"

conditions:
  # Skip cloud provider safelist + operator trusted_ips. Skill_gate would
  # refuse the block-ip step anyway, but evaluating the condition first
  # avoids logging a refused gate attempt for every cloud-provider sweep.
  ip_not_in: ["$cloud_safelist", "$trusted_ips"]
  # No asset_tags gate: until spec 058 ships, host asset tags cannot be
  # set, so an `asset_tags: ["env=prod"]` requirement made this playbook
  # dead on every host. A DATA_EXFIL kill chain (sensitive read + outbound
  # socket) warrants blocking the external source regardless of host role;
  # the ip_not_in floor + shadow mode keep it safe. Operators can add
  # `asset_tags` to scope it per host once spec 058 lands.
  sample_rate: 1.0

steps:
  - id: tarpit
    skill: block_ip_xdp
    args:
      ttl_secs: 3600
    retry:
      count: 3
      backoff: exponential
      base_ms: 200
    on_error: continue

  - id: page_oncall
    skill: route_alert
    args:
      destination: pagerduty
      severity_override: critical
      dedup_key_template: "iw:{rule_id}:{primary_ip}"
    on_error: continue

  - id: snapshot_pcap
    skill: capture_pcap
    args:
      duration_secs: 300
      target_ip: "{trigger.primary_ip}"
    timeout_secs: 30
    on_error: continue

  - id: open_jira_ticket
    skill: open_ticket
    args:
      system: jira
      project: SOC
      title_template: "InnerWarden: {trigger.chain_name} from {trigger.primary_ip}"
      labels: ["innerwarden", "critical", "{trigger.chain_id}"]
    on_error: continue
