name: Fuzz

on:
  schedule:
    # Nightly at 04:00 UTC. Nothing blocks on fuzz results; the workflow
    # uploads any crash corpus as an artifact so the operator can triage.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: cargo-fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - tls_client_hello
          - core_event_json
          - core_incident_json
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        # Keep cargo-fuzz pinned, but allow Cargo to refresh compatible
        # transitive dependencies. The published 0.13.1 lockfile still
        # freezes rustix v0.36.5, which current nightlies reject because
        # it uses compiler-reserved rustc_* attributes.
        run: cargo +nightly install cargo-fuzz --version 0.13.1

      - name: Cache fuzz corpus
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Fuzz 5 minutes
        working-directory: fuzz
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz/corpus/${{ matrix.target }}/
          retention-days: 14
