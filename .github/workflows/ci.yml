name: CI

# Spec 049 PR7-CI: path-filter the heavy Rust jobs so docs-only PRs
# (spec/wiki/CLAUDE.md changes) skip the slow steps but still report
# the check as SUCCESS to branch protection. sccache wraps rustc so
# incremental builds reuse object files across PR runs.
#
# Filter strategy: trigger the heavy steps only when the PR diff
# touches anything that can plausibly change Rust behaviour. False
# positives (run a build that turns out to be unnecessary) are
# cheaper than false negatives (skip a build that should have run).

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'rules/**'
              - 'testdata/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'scripts/**'
              - 'modules/**'
              - 'registry.toml'
              - '.github/workflows/ci.yml'

      - name: Skip notice (no Rust changes)
        if: steps.changes.outputs.rust == 'false'
        run: |
          echo "::notice::No Rust-relevant paths changed; skipping validate steps."
          echo "Filtered paths: crates/**, rules/**, testdata/**, Cargo.{toml,lock}, Makefile, scripts/**, modules/**, registry.toml, .github/workflows/ci.yml"

      - name: Setup sccache
        if: steps.changes.outputs.rust == 'true'
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Install Rust toolchain
        if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        if: steps.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Run lint and format checks
        if: steps.changes.outputs.rust == 'true'
        run: make check

      - name: Run tests
        if: steps.changes.outputs.rust == 'true'
        run: make test

      - name: Run spec checks
        if: steps.changes.outputs.rust == 'true'
        run: make spec-check

  replay-qa:
    runs-on: ubuntu-latest
    needs: [validate]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'rules/**'
              - 'testdata/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'scripts/**'
              - 'modules/**'
              - 'registry.toml'
              - '.github/workflows/ci.yml'

      - name: Skip notice (no Rust changes)
        if: steps.changes.outputs.rust == 'false'
        run: echo "::notice::No Rust-relevant paths changed; skipping replay-qa."

      - name: Setup sccache
        if: steps.changes.outputs.rust == 'true'
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Install Rust toolchain
        if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo artifacts
        if: steps.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Run end-to-end replay validation
        if: steps.changes.outputs.rust == 'true'
        run: make replay-qa

  # Spec 024 regression safety net: canonical scenarios assert expected
  # incident / telegram / block volumes on every PR. Drift (intentional
  # or accidental) outside the envelope in testdata/scenarios/*/expected.json
  # fails CI here, catching the "fix A → break B" class of bug that unit
  # tests alone miss.
  scenario-qa:
    runs-on: ubuntu-latest
    needs: [validate]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'rules/**'
              - 'testdata/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'scripts/**'
              - 'modules/**'
              - 'registry.toml'
              - '.github/workflows/ci.yml'

      - name: Skip notice (no Rust changes)
        if: steps.changes.outputs.rust == 'false'
        run: echo "::notice::No Rust-relevant paths changed; skipping scenario-qa."

      - name: Setup sccache
        if: steps.changes.outputs.rust == 'true'
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Install Rust toolchain
        if: steps.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo artifacts
        if: steps.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Set up Python (scenario-qa runner dependency)
        if: steps.changes.outputs.rust == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        with:
          python-version: "3.x"

      - name: Run spec 024 scenario volume tests
        if: steps.changes.outputs.rust == 'true'
        run: make scenario-qa
