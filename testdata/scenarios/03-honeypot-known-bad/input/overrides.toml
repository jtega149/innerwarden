# Spec 024 scenario #3 — honeypot hit from a known-bad IP.
#
# The scenario seeds two SQLite rows before running the agent:
#   - `input/seed-incidents.jsonl`   -> one honeypot incident on port 2222
#                                       from 6.6.6.6
#   - `input/seed-kv.jsonl`          -> AbuseIPDB cache entry for 6.6.6.6
#                                       with confidence_score=90
#
# This exercises the real per-incident reputation lookup (SQLite cache
# before live API) and the stub AI's "known-bad → BlockIp" branch. A
# real TCP listener on :2222 would require root on the CI runner.

[sensor.agent]
host_id = "scen-03-honeypot-known-bad"
