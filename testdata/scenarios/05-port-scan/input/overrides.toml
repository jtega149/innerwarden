# Spec 024 scenario #5 — port scan from a single IP.
#
# The port_scan detector is driven by eBPF connect syscalls
# (`ebpf.syscall.connect`) which cannot be synthesised from a userspace
# log fixture and do not run on non-Linux CI runners. Instead the
# scenario seeds a pre-built port_scan incident directly into the
# agent's SQLite store (see `input/seed-incidents.jsonl` +
# `scripts/scenario_seed.py`). The agent then triages through its real
# pipeline — stub AI → auto-executed block_ip → decision written.

[sensor.agent]
host_id = "scen-05-port-scan"
