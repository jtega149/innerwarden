# Spec 024 scenario #6 — DDoS SYN flood.
#
# The packet_flood detector is eBPF-backed and fires on kernel-observed
# SYN rates, which cannot be synthesised on the CI runner. The scenario
# seeds a pre-built `shield:*` incident (severity=critical) so the agent
# exercises its shield-acknowledgement path end-to-end: stub AI returns
# Ignore ("already mitigated by shield"), the agent still notifies but
# does NOT double-block. Composition test fails if anyone wires a
# reblock-on-shield regression.

[sensor.agent]
host_id = "scen-06-ddos-syn-flood"
